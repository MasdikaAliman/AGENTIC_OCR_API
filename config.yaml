camera:
  source: "data/capture/data5.mp4"   # int (0, 1...) for webcam, or file path
  frame_w: 640
  frame_h: 480
  fps: 30
 
mediapipe:
  max_hands: 2
  detection_confidence: 0.55
  tracking_confidence: 0.50
  model_complexity: 1
 
gesture:
  grip_threshold: 0.25    # lower = tighter grip required
  success_delay: 0.0      # seconds hand must stay at assembly zone before advancing
  pick_dwell_time: 0.0
 
zones:
  assembly: [130, 10, 536, 248]   # [x1, y1, x2, y2] — static, does not change per step
 
colors:
  white:  [240, 240, 240]
  green:  [50,  220,  90]
  red:    [60,   60, 220]
  yellow: [30,  220, 200]
  accent: [0,   210, 255]
  orange: [0,   140, 255]
  gray:   [120, 120, 120]
  purple: [200,  80, 200]
 
# -- Visual Inspection encoder settings --------------------------------------
# encoder: which matching algorithm to use
#   'xfeat'       - fast, CPU real-time, brute-force matcher  (no extra install)
#   'lightglue'   - accurate, neural matcher, slower on CPU   (needs: pip install -e LightGlue/)
#
# lightglue_features: backend extractor for LightGlue
#   'aliked'    
#   'superpoint'  
#   'disk'        
#   'sift'        
inspect:
  encoder: cnn         
  pass_threshold: 30           # min inlier count to PASS (tune 10-50)
  max_num_keypoints: 1048      # max keypoints per image (XFeat top_k / LightGlue max_num_keypoints)
  max_expected_inliers: 30     # inlier count that = similarity 1.0 (tune per item size)
  # XFeat only:
  detection_threshold: 0.1   # XFeat keypoint confidence cutoff
  # LightGlue only:
  lightglue_features: superpoint   # aliked | superpoint | disk | sift
  depth_confidence: 0.9      # LightGlue early stopping (lower=faster, -1=off)
  width_confidence: 0.9       # LightGlue point pruning  (lower=faster, -1=off)
  filter_threshold: 0.1        # LightGlue match confidence cutoff (higher=fewer,stronger)
 


sop_steps:
  - step_id: 0
    name: "STEP 1"
    instruction: "Ambil item area merah, dan Inspeksi"
    zone_pick: [71, 250, 165, 443]
    clr_pick: red
#    mode: hand_only
    mode: inspect
    inspect:
      crop_coords: [ 73, 228, 130, 300 ]      # [y1, y2, x1, x2] on resized 640x480 frame
      reference_folder: "data/capture/SOP_IMAGE/STEP1"
      pass_threshold: 0.6

  - step_id: 1
    name: "STEP 2"
    instruction: "Ambil item dari area ORANGE"
    zone_pick: [189, 250, 273, 443]
    clr_pick: orange
    mode: hand_only


  - step_id: 2
    name: "STEP 3"
    instruction: "Ambil item dari area UNGU"
    zone_pick: [281, 250, 377, 440]
    clr_pick: purple
    mode: hand_only

  - step_id: 3
    name: "STEP 4"
    instruction: "Ambil item dari area UNGU"
    zone_pick: [370, 250, 483, 444]
    clr_pick: purple
    mode: hand_only

  - step_id: 4
    name: "STEP 5"
    instruction: "Ambil item dari area UNGU dan Inspect"
    zone_pick: [467, 250, 591, 437]
    clr_pick: purple
#    mode: hand_only
    mode: inspect
    inspect:
      crop_coords: [ 5, 151, 180, 420]      # [y1, y2, x1, x2] on resized 640x480 frame
      reference_folder: "data/capture/SOP_IMAGE/STEP5"
      pass_threshold: 0.6
